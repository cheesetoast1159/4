<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RhythmStrike</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c0: #FF4D4D;
    --c1: #FFD700;
    --c2: #4DFF91;
    --c3: #4DA6FF;
    --bg: #0a0a0a;
    --panel: #111111;
    --line: #222;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    color: #fff;
    overflow: hidden;
  }

  /* Subtle scanline texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    pointer-events: none;
    z-index: 100;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(20px, 4vw, 32px);
    letter-spacing: 10px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  h1 span { color: var(--c1); }

  #hud {
    display: flex;
    gap: 32px;
    margin-bottom: 10px;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  #hud .val { font-weight: 700; }
  #score-val  { color: var(--c1); }
  #combo-val  { color: var(--c2); }
  #speed-val  { color: var(--c0); }

  #game {
    position: relative;
    width: min(340px, 92vw);
    height: min(600px, 65vh);
    background: var(--panel);
    border: 2px solid #2a2a2a;
    overflow: hidden;
  }

  /* Lane vertical dividers */
  .divider {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: var(--line);
    z-index: 1;
  }

  /* Lane flash overlay */
  .lane-bg {
    position: absolute;
    top: 0; bottom: 0;
    z-index: 0;
    transition: background 0.05s;
  }

  /* Hit zone line */
  #hit-line {
    position: absolute;
    left: 0; right: 0;
    height: 3px;
    background: #fff;
    box-shadow: 0 0 10px #fff, 0 0 20px #ffffff88;
    z-index: 5;
  }

  /* Hit zone target boxes */
  .target {
    position: absolute;
    z-index: 6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    border-width: 2px;
    border-style: solid;
  }

  /* Tiles */
  .tile {
    position: absolute;
    z-index: 3;
    border-radius: 3px;
    transition: box-shadow 0.05s;
  }

  /* Hit effects */
  .effect {
    position: absolute;
    z-index: 10;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 2px;
    text-align: center;
    pointer-events: none;
    animation: floatUp 0.6s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1.3); }
    100% { opacity: 0; transform: translateY(-45px) scale(0.8); }
  }

  /* Speed flash */
  #speed-flash {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.07);
    z-index: 20;
    pointer-events: none;
    opacity: 0;
  }
  #speed-flash.flash { animation: sflash 0.3s ease-out forwards; }
  @keyframes sflash {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Overlay */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 30;
  }
  .overlay h2 {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    letter-spacing: 5px;
  }
  .overlay p {
    font-size: 12px;
    letter-spacing: 2px;
    color: #888;
    text-align: center;
    line-height: 1.8;
  }
  .overlay .stat { font-size: 14px; letter-spacing: 3px; color: #ccc; }
  .overlay .stat span { font-weight: 700; }

  .btn {
    margin-top: 6px;
    padding: 11px 32px;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
  }
  .btn-start { background: var(--c1); color: #000; }
  .btn-retry { background: var(--c0); color: #fff; }
  .btn:hover { filter: brightness(1.15); }

  /* Mobile tap buttons */
  #tap-row {
    display: flex;
    gap: 6px;
    margin-top: 12px;
  }
  .tap-btn {
    width: 74px;
    height: 50px;
    background: #1a1a1a;
    border-width: 2px;
    border-style: solid;
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    transition: background 0.05s;
    -webkit-tap-highlight-color: transparent;
  }
  .tap-btn:active { filter: brightness(1.4); }

  #instructions {
    margin-top: 10px;
    font-size: 11px;
    letter-spacing: 2px;
    color: #444;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<h1>Rhythm<span>Strike</span></h1>

<div id="hud">
  <span>Score <span class="val" id="score-val">0</span></span>
  <span>Combo <span class="val" id="combo-val">x0</span></span>
  <span>Spd <span class="val" id="speed-val">LV1</span></span>
</div>

<div id="game">
  <div id="speed-flash"></div>

  <!-- Lane backgrounds -->
  <div class="lane-bg" id="lane-bg-0"></div>
  <div class="lane-bg" id="lane-bg-1"></div>
  <div class="lane-bg" id="lane-bg-2"></div>
  <div class="lane-bg" id="lane-bg-3"></div>

  <!-- Dividers -->
  <div class="divider" style="left:25%"></div>
  <div class="divider" style="left:50%"></div>
  <div class="divider" style="left:75%"></div>

  <!-- Hit line -->
  <div id="hit-line"></div>

  <!-- Target zones -->
  <div class="target" id="target-0">D</div>
  <div class="target" id="target-1">F</div>
  <div class="target" id="target-2">J</div>
  <div class="target" id="target-3">K</div>

  <!-- Tile container -->
  <div id="tile-layer"></div>

  <!-- Effect container -->
  <div id="effect-layer"></div>

  <!-- Start overlay -->
  <div class="overlay" id="overlay-start">
    <h2>Ready?</h2>
    <p>Hit tiles as they reach the white line<br>Tiles speed up every 5 seconds!</p>
    <p style="color:#555;font-size:11px;letter-spacing:2px">KEYBOARD: D &nbsp; F &nbsp; J &nbsp; K</p>
    <button class="btn btn-start" onclick="startGame()">START</button>
  </div>

  <!-- Game over overlay -->
  <div class="overlay" id="overlay-gameover" style="display:none">
    <h2 style="color:var(--c0)">Game Over</h2>
    <div class="stat">Score: <span id="final-score" style="color:var(--c1)">0</span></div>
    <div class="stat">Max Combo: <span id="final-combo" style="color:var(--c2)">0</span></div>
    <div class="stat">Max Speed: <span id="final-speed" style="color:var(--c0)">LV1</span></div>
    <button class="btn btn-retry" onclick="startGame()">Retry</button>
  </div>
</div>

<div id="tap-row">
  <button class="tap-btn" id="tap-0" style="color:var(--c0);border-color:var(--c0)">D</button>
  <button class="tap-btn" id="tap-1" style="color:var(--c1);border-color:var(--c1)">F</button>
  <button class="tap-btn" id="tap-2" style="color:var(--c2);border-color:var(--c2)">J</button>
  <button class="tap-btn" id="tap-3" style="color:var(--c3);border-color:var(--c3)">K</button>
</div>

<div id="instructions">tap or use D F J K keys</div>

<script>
const LANE_COLORS = ['#FF4D4D','#FFD700','#4DFF91','#4DA6FF'];
const LANE_KEYS   = ['d','f','j','k'];
const HIT_ZONE    = 0.82; // fraction from top
const TILE_H      = 80;
const BASE_SPEED  = 180;
const SPEED_INC   = 30;
const GAP         = 4; // px gap each side in lane

let tiles = [], score = 0, combo = 0, maxCombo = 0;
let speed = BASE_SPEED, speedLevel = 1;
let spawnTimer = 0, speedTimer = 0;
let lastTime = null, rafId = null;
let running = false, dead = false;
let tileId = 0;

const game       = document.getElementById('game');
const tilLayer   = document.getElementById('tile-layer');
const effLayer   = document.getElementById('effect-layer');
const hitLine    = document.getElementById('hit-line');
const scoreEl    = document.getElementById('score-val');
const comboEl    = document.getElementById('combo-val');
const speedEl    = document.getElementById('speed-val');
const overlayStart = document.getElementById('overlay-start');
const overlayOver  = document.getElementById('overlay-gameover');
const sflash     = document.getElementById('speed-flash');

function laneX(i) {
  const w = game.clientWidth;
  return (i / 4) * w + GAP;
}
function laneW() {
  return game.clientWidth / 4 - GAP * 2;
}
function hitZonePx() {
  return game.clientHeight * HIT_ZONE;
}

function initLayout() {
  const h = game.clientHeight;
  const w = game.clientWidth;
  hitLine.style.top = (h * HIT_ZONE) + 'px';

  for (let i = 0; i < 4; i++) {
    const x = laneX(i);
    const lw = laneW();
    const bg = document.getElementById('lane-bg-' + i);
    bg.style.left = (i / 4 * 100) + '%';
    bg.style.width = '25%';

    const tgt = document.getElementById('target-' + i);
    tgt.style.left   = x + 'px';
    tgt.style.width  = lw + 'px';
    tgt.style.top    = (h * HIT_ZONE - 18) + 'px';
    tgt.style.height = '36px';
    tgt.style.color  = LANE_COLORS[i];
    tgt.style.borderColor = LANE_COLORS[i];
    tgt.style.background  = LANE_COLORS[i] + '18';
  }
}

function spawnInterval() {
  return Math.max(280, 700 - (speed - BASE_SPEED) * 2);
}

function spawnTile() {
  const lane = Math.floor(Math.random() * 4);
  const el = document.createElement('div');
  el.className = 'tile';
  el.style.left   = laneX(lane) + 'px';
  el.style.width  = laneW() + 'px';
  el.style.height = TILE_H + 'px';
  el.style.top    = (-TILE_H) + 'px';
  el.style.background   = LANE_COLORS[lane];
  el.style.boxShadow    = `0 0 12px ${LANE_COLORS[lane]}99`;
  tilLayer.appendChild(el);
  tiles.push({ id: tileId++, lane, y: -TILE_H, el });
}

function removeTile(tile) {
  tile.el.remove();
  tiles = tiles.filter(t => t !== tile);
}

function showEffect(lane, type) {
  const el = document.createElement('div');
  el.className = 'effect';
  const x = laneX(lane);
  const lw = laneW();
  el.style.left  = x + 'px';
  el.style.width = lw + 'px';
  el.style.top   = (hitZonePx() - 36) + 'px';
  el.style.color = type === 'PERFECT' ? '#FFD700' : type === 'GOOD' ? '#4DFF91' : '#FF4D4D';
  el.textContent = type;
  effLayer.appendChild(el);
  setTimeout(() => el.remove(), 650);
}

function flashLane(i) {
  const bg = document.getElementById('lane-bg-' + i);
  bg.style.background = LANE_COLORS[i] + '28';
  setTimeout(() => bg.style.background = 'transparent', 110);
  const btn = document.getElementById('tap-' + i);
  btn.style.background = LANE_COLORS[i] + '44';
  setTimeout(() => btn.style.background = '#1a1a1a', 110);
}

function hit(lane) {
  if (!running || dead) return;
  flashLane(lane);
  const hz = hitZonePx();
  const window55 = 55;
  const idx = tiles.findIndex(t => t.lane === lane && Math.abs(t.y - hz) < window55);
  if (idx !== -1) {
    const diff = Math.abs(tiles[idx].y - hz);
    const perfect = diff < 20;
    removeTile(tiles[idx]); // note: tiles mutated in removeTile
    combo++;
    if (combo > maxCombo) maxCombo = combo;
    score += perfect ? 100 * combo : 50 * combo;
    scoreEl.textContent = score;
    comboEl.textContent = 'x' + combo;
    showEffect(lane, perfect ? 'PERFECT' : 'GOOD');
  } else {
    combo = 0;
    comboEl.textContent = 'x0';
    showEffect(lane, 'MISS');
  }
}

function loop(ts) {
  if (dead) return;
  if (!lastTime) lastTime = ts;
  const dt = (ts - lastTime) / 1000;
  lastTime = ts;

  // Speed up
  speedTimer += dt * 1000;
  if (speedTimer >= 5000) {
    speedTimer = 0;
    speed += SPEED_INC;
    speedLevel++;
    speedEl.textContent = 'LV' + speedLevel;
    sflash.classList.remove('flash');
    void sflash.offsetWidth;
    sflash.classList.add('flash');
  }

  // Spawn
  spawnTimer += dt * 1000;
  if (spawnTimer >= spawnInterval()) {
    spawnTimer = 0;
    spawnTile();
  }

  // Move tiles
  const hz = hitZonePx();
  for (const t of tiles) {
    t.y += speed * dt;
    t.el.style.top = t.y + 'px';
  }

  // Miss check
  const missed = tiles.find(t => t.y > hz + TILE_H * 1.5);
  if (missed) {
    endGame();
    return;
  }

  rafId = requestAnimationFrame(loop);
}

function startGame() {
  if (rafId) cancelAnimationFrame(rafId);
  tiles.forEach(t => t.el.remove());
  tilLayer.innerHTML = '';
  effLayer.innerHTML = '';
  tiles = []; score = 0; combo = 0; maxCombo = 0;
  speed = BASE_SPEED; speedLevel = 1;
  spawnTimer = 0; speedTimer = 0; lastTime = null; dead = false; tileId = 0;

  scoreEl.textContent = '0';
  comboEl.textContent = 'x0';
  speedEl.textContent = 'LV1';

  overlayStart.style.display = 'none';
  overlayOver.style.display  = 'none';

  initLayout();
  running = true;
  rafId = requestAnimationFrame(loop);
}

function endGame() {
  dead = true; running = false;
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-combo').textContent = 'x' + maxCombo;
  document.getElementById('final-speed').textContent = 'LV' + speedLevel;
  overlayOver.style.display = 'flex';
}

// Keyboard
document.addEventListener('keydown', e => {
  const i = LANE_KEYS.indexOf(e.key.toLowerCase());
  if (i !== -1) hit(i);
});

// Mobile tap buttons
for (let i = 0; i < 4; i++) {
  document.getElementById('tap-' + i).addEventListener('pointerdown', () => hit(i));
}

window.addEventListener('resize', () => { if (running) initLayout(); });

initLayout();
</script>
</body>
</html>
